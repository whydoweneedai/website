<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --blue:#2563eb; --blue-dark:#1d4ed8; --ink:#0f172a; --sub:#475569;
    --soft:#eff6ff; --border:#dbeafe; }
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#f0f7ff,#fff);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:16px;}
  .app{width:100%;max-width:430px;}
  .screen{animation:slide .35s ease;}
  @keyframes slide{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  h1{font-size:36px;font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:10px;}
  .sub{font-size:16px;color:var(--sub);line-height:1.5;margin-bottom:24px;}
  .btn{display:block;width:100%;padding:17px;border:none;border-radius:16px;
    background:var(--blue);color:#fff;font-size:17px;font-weight:800;cursor:pointer;
    font-family:inherit;box-shadow:0 6px 16px rgba(37,99,235,.28);transition:.12s;}
  .btn:active{transform:scale(.97);background:var(--blue-dark);}
  .progress{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub);font-family:inherit;}
  .bar{flex:1;height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
  .fill{height:100%;background:var(--blue);border-radius:99px;transition:width .3s;}
  .count{font-size:13px;font-weight:800;color:var(--sub);}
  .q{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:18px;}
  .card{display:block;width:100%;text-align:left;padding:16px;margin-bottom:10px;
    background:#fff;border:2px solid var(--border);border-radius:18px;font-size:16px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:.1s;color:var(--ink);}
  .card:hover,.card:active{border-color:var(--blue);background:var(--soft);}
  input{width:100%;padding:15px 16px;margin-bottom:12px;border:2px solid var(--border);
    border-radius:14px;font-size:16px;font-family:inherit;font-weight:600;}
  input:focus{outline:none;border-color:var(--blue);}
  .fine{font-size:13px;color:var(--sub);text-align:center;margin-top:10px;}
  .score{font-size:76px;font-weight:900;color:var(--blue);text-align:center;line-height:1;margin:6px 0;}
  .badge{display:inline-block;padding:8px 18px;border-radius:99px;background:var(--soft);
    border:2px solid var(--border);font-weight:900;font-size:17px;margin-bottom:14px;}
  .tip{background:var(--soft);border:2px dashed var(--blue);border-radius:18px;
    padding:14px 16px;font-size:15px;line-height:1.5;margin:16px 0;text-align:left;}
  .tip b{color:var(--blue-dark);}
  .footer{font-size:12.5px;color:#94a3b8;text-align:center;margin-top:22px;font-style:italic;}
  .center{text-align:center;}
  .emoji{font-size:48px;text-align:center;margin-bottom:6px;}
  .logo{display:block;width:100%;max-width:280px;height:auto;margin:0 auto 14px;border-radius:16px;}
  .logo-sm{display:block;width:100%;max-width:150px;height:auto;margin:0 auto 12px;border-radius:12px;}
</style>

<body>

<!-- Hidden form so Netlify detects it at deploy time -->
<form name="readyscore-leads" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name"><input type="email" name="email">
  <input type="text" name="phone">
  <input type="text" name="score"><input type="text" name="persona">
  <input type="text" name="pain"><input type="text" name="worry">
  <input type="text" name="answers">
</form>

<div class="app" id="app"></div>

<script>
const questions = [
  {q:"How does your team currently use AI?", scored:true, a:[
    ["Not at all",0],["Someone plays with ChatGPT sometimes",1],
    ["A few people use it regularly",2],["It's built into how we work",3]]},
  {q:"What eats the most time in your week?", scored:false, key:"pain", a:[
    ["Repetitive data entry","data"],["Customer communication","comms"],
    ["Scheduling & coordination","sched"],["Reports & paperwork","reports"]]},
  {q:"Where does your business data live?", scored:true, a:[
    ["Paper and memory",0],["Spreadsheets",1],
    ["One main software (QuickBooks, a CRM…)",2],["Multiple systems that talk to each other",3]]},
  {q:"If a task takes 2 hours a week, would you spend money to automate it?", scored:true, a:[
    ["Probably not",0],["Maybe, if it's cheap",1],
    ["Yes, if it's proven to work",2],["Already doing this",3]]},
  {q:"Who would own an AI project at your company?", scored:true, a:[
    ["Nobody has time",0],["Me, reluctantly",1],["Me, excitedly",2],["A dedicated person",3]]},
  {q:"How documented are your processes?", scored:true, a:[
    ["All in people's heads",0],["Some checklists exist",1],
    ["Mostly written down",2],["Fully documented",3]]},
  {q:"What's your biggest AI worry?", scored:false, key:"worry", a:[
    ["It'll get things wrong","wrong"],["Too expensive","cost"],
    ["Too complicated","complex"],["Losing the human touch","human"]]},
  {q:"How fast do you want to move?", scored:true, a:[
    ["Just curious",0],["Next 6 months",1],["Next 90 days",2],["Yesterday",3]]}
];

const tips = {
  data:"Tools like Zapier + AI can move data between your systems automatically. This is usually the fastest payback of any automation.",
  comms:"An AI assistant can draft replies to common customer questions in your voice — you just review and hit send.",
  sched:"AI scheduling tools can handle the back-and-forth of booking so you never play calendar tennis again.",
  reports:"AI can turn your voice notes or bullet points into finished reports and documents in your format."
};

const personas = [
  {min:0,max:40,name:"AI Curious",emoji:"🌱",desc:"You're not behind — you're early. Most small businesses are exactly where you are. The good news: your first win is easier than you think."},
  {min:41,max:70,name:"AI Ready",emoji:"⚡",desc:"Your foundation is solid. You're one good project away from saving real hours every week. You just need a roadmap."},
  {min:71,max:100,name:"AI Dangerous",emoji:"🚀",desc:"(In a good way.) You're ahead of 90% of small businesses. Time to turn that head start into a real advantage."}
];

let state = {i:0, score:0, answers:[], pain:null, worry:null};
const app = document.getElementById("app");
const esc = s => {const d=document.createElement("div");d.textContent=s;return d.innerHTML;};
const finalScore = () => Math.round(state.score/18*100);
const persona = () => personas.find(p => finalScore()>=p.min && finalScore()<=p.max);

function welcome(){
  state = {i:0, score:0, answers:[], pain:null, worry:null};
  app.innerHTML = `
    <div class="screen center">
      <img src="website_logo.png" alt="whydoweneedai.com" class="logo">
      <h1>Do I Need AI?</h1>
      <p class="sub">Find out your AI ReadyScore in 2 minutes.<br>No jargon, no judgment, no sales pitch.</p>
      <button class="btn" onclick="question()">Let's find out →</button>
      <p class="footer">Built by someone who was also confused by AI once.</p>
    </div>`;
}

function question(){
  const q = questions[state.i];
  const pct = Math.round(state.i/questions.length*100);
  app.innerHTML = `
    <div class="screen">
      <div class="progress">
        ${state.i>0 ? '<button class="back" onclick="goBack()">←</button>' : ''}
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        <span class="count">${state.i+1} of ${questions.length}</span>
      </div>
      <h2 class="q">${esc(q.q)}</h2>
      ${q.a.map((p,idx)=>`<button class="card" onclick="answer(${idx})">${esc(p[0])}</button>`).join("")}
    </div>`;
}

function goBack(){
  state.i--;
  const prev = state.answers.pop();
  const q = questions[state.i];
  if(q.scored) state.score -= prev.pts;
  question();
}

function answer(idx){
  const q = questions[state.i];
  const [label, val] = q.a[idx];
  state.answers.push({q:q.q, a:label, pts:q.scored?val:0});
  if(q.scored) state.score += val; else state[q.key] = val;
  state.i++;
  state.i < questions.length ? question() : gate();
}

function gate(){
  app.innerHTML = `
    <div class="screen center">
      <div class="emoji">🎉</div>
      <h1 style="font-size:27px;">Your ReadyScore is ready</h1>
      <p class="sub">We'll send you your results + one free tip. That's it.</p>
      <input id="fname" placeholder="First name" autocomplete="given-name">
      <input id="flname" placeholder="Last name" autocomplete="family-name">
      <input id="femail" type="email" placeholder="Email" autocomplete="email">
      <input id="fphone" type="tel" placeholder="Phone (optional)" autocomplete="tel">
      <button class="btn" onclick="reveal()">Show me my score</button>
      <p class="fine" id="err"></p>
    </div>`;
}

// Each lead is appended as a row to a Google Sheet via an Apps Script web app.
// Paste the deployed web app URL below (see google-sheet-apps-script.gs for setup).
const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzm1of9hCL1u_AePMuE8O6ZB4a72hyiyurDmYu2EvU-7udV3vistDlnRahiELhu6-eW/exec";

function reveal(){
  const name = document.getElementById("fname").value.trim();
  const lastName = document.getElementById("flname").value.trim();
  const email = document.getElementById("femail").value.trim();
  const phone = document.getElementById("fphone").value.trim();
  if(!name || !lastName || !/.+@.+\..+/.test(email)){
    document.getElementById("err").textContent = "Just need your name and a real email 🙂";
    return;
  }
  const payload = {
    firstName: name,
    lastName: lastName,
    email: email,
    phone: phone,
    readyScore: finalScore(),
    persona: (persona() || {}).name || "",
    pain: state.pain || "",
    worry: state.worry || "",
    pageUrl: location.href
  };
  // no-cors + text/plain avoids a CORS preflight Apps Script can't answer.
  // Fire-and-forget: the Sheet itself is the record, so a network hiccup never blocks the reveal.
  fetch(SHEET_WEBAPP_URL, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  }).catch(e=>console.error("Sheet submit error", e));
  results(name);
}

function results(name){
  const s = finalScore(), p = persona();
  app.innerHTML = `
    <div class="screen center">
      <img src="website_logo.png" alt="whydoweneedai.com" class="logo-sm">
      <p class="sub" style="margin-bottom:0;">${esc(name)}, your AI ReadyScore is</p>
      <div class="score" id="num">0</div>
      <span class="badge">${p.emoji} ${p.name}</span>
      <p class="sub" style="margin-bottom:0;">${p.desc}</p>
      <div class="tip"><b>Your quick win:</b> ${tips[state.pain]}</div>
      <p class="sub" style="margin-bottom:8px;font-weight:800;color:var(--ink);">Book your free deep dive 👇</p>
      <p class="fine" style="margin-top:0;">30 minutes. Zero pressure. We'll map your first automation together.</p>
      <div id="cal" style="min-width:300px;height:660px;"></div>
      <p class="footer">Built by someone who was also confused by AI once.</p>
    </div>`;
  const cal = document.getElementById("cal");
  if(window.Calendly && Calendly.initInlineWidget){
    Calendly.initInlineWidget({url: CALENDLY_URL, parentElement: cal});
  } else {
    cal.innerHTML = `<a href="${CALENDLY_URL}" target="_blank" rel="noopener" style="text-decoration:none;"><button class="btn">Book my free deep dive</button></a>`;
  }
  let cur = 0;
  const step = Math.max(1, Math.round(s/40));
  const t = setInterval(()=>{
    cur = Math.min(cur+step, s);
    document.getElementById("num").textContent = cur;
    if(cur >= s) clearInterval(t);
  }, 28);
}

welcome();
</script>
</body>
